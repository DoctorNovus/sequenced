server {
  listen 80;
  listen [::]:80;
  server_name sequenced.ottegi.com api.sequenced.ottegi.com dashboard.tidaltask.app api.tidaltask.app;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/letsencrypt;
    try_files $uri =404;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name dashboard.tidaltask.app;

  ssl_certificate /etc/letsencrypt/live/sequenced.ottegi.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/sequenced.ottegi.com/privkey.pem;

  location / {
    proxy_pass http://frontend:80;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;

    proxy_hide_header ETag;
    proxy_hide_header Last-Modified;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name api.tidaltask.app;

  ssl_certificate /etc/letsencrypt/live/sequenced.ottegi.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/sequenced.ottegi.com/privkey.pem;

  location / {
    proxy_pass http://api:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

