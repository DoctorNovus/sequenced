name: Deploy

on:
  push:
    branches:
      - main

jobs:
  # ── Server + frontend Docker deploy ─────────────────────────────────────────
  deploy-server:
    name: Deploy to Droplet
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: dashboard.tidaltask.app
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          command_timeout: 90m
          script_stop: true
          script: |
            set -euo pipefail
            set -x
            cd /root/sequenced
            echo "[1/9] Fetching main" && date
            git fetch origin main
            echo "[2/9] Checking out main" && date
            git checkout main
            PREV_HEAD=$(git rev-parse HEAD)
            echo "[3/9] Pulling latest" && date
            git pull --rebase origin main
            NEW_HEAD=$(git rev-parse HEAD)
            CHANGED_FILES=$(git diff --name-only "$PREV_HEAD" "$NEW_HEAD" || true)
            echo "[4/9] Changed files" && date
            printf '%s\n' "$CHANGED_FILES"

            BUILD_FRONTEND=false
            BUILD_API=false

            if printf '%s\n' "$CHANGED_FILES" | grep -Eq '^(package\.json|package-lock\.json|packages/app/|packages/app/Dockerfile)'; then
              BUILD_FRONTEND=true
            fi
            if printf '%s\n' "$CHANGED_FILES" | grep -Eq '^(package\.json|package-lock\.json|packages/api/|packages/api/Dockerfile)'; then
              BUILD_API=true
            fi

            echo "[5/9] Building images (selective)" && date
            export DOCKER_BUILDKIT=1
            if [ "$BUILD_FRONTEND" = true ]; then
              timeout 35m docker compose --progress=plain build frontend
            fi
            if [ "$BUILD_API" = true ]; then
              timeout 35m docker compose --progress=plain build api
            fi
            if [ "$BUILD_FRONTEND" = false ] && [ "$BUILD_API" = false ]; then
              echo "No app/api build required for this deploy."
            fi

            echo "[6/9] Recreating containers" && date
            timeout 10m docker compose up -d --remove-orphans
            echo "[7/9] Pruning dangling images" && date
            timeout 10m docker image prune -f
            echo "[8/9] Container status" && date
            docker compose ps
            echo "[9/9] Deploy complete" && date

  # ── iOS build + App Store submission ────────────────────────────────────────
  ios-release:
    name: Build & Submit to App Store
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app + sync Capacitor
        run: npm run build:full
        working-directory: packages/app

      # Import the distribution certificate into a dedicated CI keychain
      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERTIFICATE_BASE64" | tr -d ' \n\r' | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 \
            -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm -f certificate.p12

      # Install the App Store distribution provisioning profile
      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          echo "$PROFILE_BASE64" | tr -d ' \n\r' | base64 --decode > profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          mv profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Set up Ruby + Bundler
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: packages/app/ios/App

      # Build archive and submit for App Review (waits for processing)
      - name: Submit to App Store
        working-directory: packages/app/ios/App
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          APP_IDENTIFIER: com.ottegi.sequenced-app
          BUNDLE_PATH: vendor/bundle
          BUNDLE_DISABLE_SHARED_GEMS: "1"
        run: bundle exec fastlane ios release_app_store
